server {
    listen 80;
    server_name _;

    proxy_ssl_verify off;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        application/xml
        application/xml+rss
        image/svg+xml;

    location /static/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # This location handles all requests for your frontend
    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri /index.html;
    }

    # This is the crucial part that proxies API calls to your backend
    # The lack of a trailing slash on location /api tells Nginx to strip the prefix
    location /api {
        proxy_pass https://nordikdriveapi-724838782318.us-west1.run.app/api/; 

        # These headers ensure the backend sees the original request details
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    error_page 500 502 503 504 /index.html;
}
